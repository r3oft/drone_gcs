# ======== M1：视觉流采集（单摄像头，外侧安装） ========
stream:
  url: "http://192.168.4.2:81/stream"            # ESP32-CAM MJPEG 流地址
  timeout_ms: 3000                               # 连接/读取超时（毫秒）

# ======== M2：YOLO-OBB 推理 ========
perception:
  weights: "weights/yolov8n-obb-custom.pt"       # 权重文件路径（两类共用同一模型）
  conf_threshold: 0.6                            # NMS 置信度下限
  device: "cuda:0"                               # 推理设备
  # 任务目标映射：将 FSM 任务阶段绑定到目标类别
  task_targets:
    pickup_zone:
      cls_id: 0                                  # 取货区（蓝色胶带，~30x30cm）
    delivery_zone:
      cls_id: 1                                  # 投递区（红色胶带，~30x30cm）

# ======== M3：PD 视觉伺服控制器（按任务阶段分组） ========
servo:
  pickup_align:                                  # 取货区对准阶段参数
    kp: { x: 0.003, y: 0.003, yaw: 0.6 }
    kd: { x: 0.001, y: 0.001, yaw: 0.1 }
    deadband: { x: 30, y: 30, yaw: 0.1 }        # 取货区较大，精度要求适中
    max_vel: { x: 0.3, y: 0.3, yaw: 0.5 }       # 饱和限幅（m/s 或 rad/s）
  delivery_align:                                # 投递区对准阶段参数（规格与取货区相仿）
    kp: { x: 0.003, y: 0.003, yaw: 0.6 }
    kd: { x: 0.001, y: 0.001, yaw: 0.1 }
    deadband: { x: 30, y: 30, yaw: 0.1 }
    max_vel: { x: 0.3, y: 0.3, yaw: 0.5 }

# ======== M4：MAVLink 通信 ========
mavlink:
  connection: "udp:192.168.4.1:14550"            # 飞控 UDP 链路
  heartbeat_timeout_s: 5                         # 心跳超时（秒）
  reconnect_enabled: true                        # 心跳超时后自动重连
  reconnect_max_attempts: 3                      # 每次检测触发的最大重连次数
  reconnect_backoff_s: 1.0                       # 重连退避间隔（秒）

# ======== M5：状态机 / 容错 ========
fsm:
  align_hold_time_s: 1.5                         # 对齐防抖持续时间（秒）
  target_lost_hover_s: 1.0                       # 短时丢失 → 悬停阈值
  target_lost_climb_s: 3.0                       # 长时丢失 → 爬升阈值
  climb_vz: -0.2                                 # 爬升速度（m/s，NED 下为负）
  tick_rate_hz: 15                               # 主循环频率上限

# ======== 日志系统 ========
logging:
  level: "INFO"                                  # DEBUG / INFO / WARNING / ERROR
  log_dir: "logs/"                               # 日志输出目录
  enable_flight_recorder: true                   # 是否启用飞行黑匣子

# ======== 性能监控 ========
perf:
  window_size: 30                                # 滑动窗口大小（样本数）
  enable: true                                   # 全局开关（生产环境可关闭）
  print_interval: 150                            # 每隔多少帧打印一次摘要（0 = 不自动打印）
  warn_threshold_ms: 80                          # 单帧耗时告警阈值（ms）

# ======== 图像参数（单摄像头） ========
camera:
  resolution: { w: 640, h: 480 }
  center_u: 320                                  # 光学中心 u 坐标
  center_v: 240                                  # 光学中心 v 坐标
  offset: { x: 0.0, y: 0.0 }                    # 外侧安装偏移（米），Phase 3 实测填入

# ======== 末端执行器（叉式托举机构） ========
gripper:
  channel: 9                                     # AUX 通道号
  open_pwm: 1100                                 # 张开脉宽（μs）
  close_pwm: 1900                                # 闭合脉宽（μs）

# ======== 飞行控制（FlightBridge 使用） ========
flight:
  takeoff_alt: 1.5              # 默认任务高度 (m)
  land_detect_alt: 0.15         # 触地判定高度阈值 (m)
  arm_timeout_s: 10             # 解锁等待超时 (s)
  takeoff_timeout_s: 15         # 起飞等待超时 (s)
  land_timeout_s: 20            # 降落等待超时 (s)

# ======== MCU 通信（MCUBridge 使用） ========
mcu:
  grab_timeout_s: 10            # 等待 GRAB_DONE 响应超时 (s)
  release_timeout_s: 10         # 等待 RELEASE_DONE 响应超时 (s)
  retry_max: 2                  # 动作失败最大重试次数

# ======== 定距转移 ========
transfer:
  delivery_distance_m: 3.0      # 取货区到投递区预设距离 (m)
  transfer_speed: 0.3           # 转移飞行速度 (m/s)
  transfer_alt: 1.5             # 转移飞行高度 (m)
  transfer_heading_deg: 0       # 转移飞行航向 (deg)，待实测确定
